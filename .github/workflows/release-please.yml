name: Release Please

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish to crates.io
    needs: release-please
    if: needs.release-please.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Publish repograph-core only when its version isn't on crates.io yet.
      # The lib's version is hand-managed (lock-step with the bin in v0.x).
      - name: Publish repograph-core (idempotent)
        working-directory: crates/repograph-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          version=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "repograph-core") | .version')
          if curl -sf -o /dev/null "https://crates.io/api/v1/crates/repograph-core/$version"; then
            echo "repograph-core $version already on crates.io — skipping"
          else
            echo "Publishing repograph-core $version"
            cargo publish --token "$CARGO_REGISTRY_TOKEN"
            # Wait for the index so the dependent publish below can resolve.
            sleep 30
          fi

      - name: Publish repograph
        working-directory: crates/repograph
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --token "$CARGO_REGISTRY_TOKEN"
