[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
ignore = [
    # Transitive: number_prefix via indicatif (no safe upgrade upstream).
    { id = "RUSTSEC-2025-0119", reason = "number_prefix via indicatif - transitive, no safe upgrade" },
    # `paste` is unmaintained but has no security impact and no maintained
    # replacement; it is pulled only by the ONNX/ort stack behind the optional
    # `semantic` feature (not built by default). Revisit if ort drops it.
    { id = "RUSTSEC-2024-0436", reason = "paste unmaintained - transitive via ort/fastembed (optional `semantic` feature), no fix available" },
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "CC0-1.0",
    "BSL-1.0",
    "OpenSSL",
    "CDLA-Permissive-2.0",
    # University of Illinois/NCSA Open Source License — permissive, OSI-approved.
    # Carried by the ONNX Runtime bindings (`ort-sys`) behind the optional
    # `semantic` feature; not pulled by default builds.
    "NCSA",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
